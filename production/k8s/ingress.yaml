apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-success-fte
  namespace: customer-success-fte
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - support-api.techcorp.io
    secretName: fte-tls
  rules:
  - host: support-api.techcorp.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: customer-success-fte
            port:
              number: 80
